services:
  - type: web
    name: fastapi-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host=0.0.0.0 --port=8000
    workingDir: backend
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.10